<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Live2D Test</title>
  <style>
    body { margin: 0; background: #333; }
    #log { color: lime; font-family: monospace; padding: 10px; position: fixed; top: 0; left: 0; z-index: 10; background: rgba(0,0,0,0.8); max-width: 500px; font-size: 13px; }
  </style>
</head>
<body>
  <div id="log">初始化中...</div>
  <script src="/live2dcubismcore.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/pixi.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>
  <script>
    const log = document.getElementById('log');
    function addLog(msg) {
      log.innerHTML += '<br>' + msg;
      console.log(msg);
    }

    addLog('PIXI: ' + (typeof PIXI !== 'undefined' ? PIXI.VERSION : 'NOT LOADED'));
    addLog('Live2DCubismCore: ' + (typeof Live2DCubismCore !== 'undefined' ? 'OK' : 'NOT LOADED'));
    addLog('PIXI.live2d: ' + (typeof PIXI !== 'undefined' && PIXI.live2d ? 'OK' : 'NOT LOADED'));

    async function init() {
      try {
        const app = new PIXI.Application({
          width: window.innerWidth,
          height: window.innerHeight,
          backgroundColor: 0x1a1a2e,
          antialias: true,
        });
        document.body.appendChild(app.view);
        addLog('PIXI Application: OK');

        addLog('載入模型中...');
        const model = await PIXI.live2d.Live2DModel.from(
          '/models/hiyori_free/hiyori_free_t08.model3.json'
        );
        addLog('模型載入: OK  size=' + model.width.toFixed(0) + 'x' + model.height.toFixed(0));

        app.stage.addChild(model);
        model.anchor.set(0.5, 0.5);
        model.scale.set(0.35);
        model.x = window.innerWidth / 2;
        model.y = window.innerHeight * 0.8;
        addLog('完成！Hiyori 應該出現了');
      } catch (e) {
        addLog('錯誤: ' + e.message);
        console.error(e);
      }
    }

    init();
  </script>
</body>
</html>
