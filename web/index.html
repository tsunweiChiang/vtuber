<!-- =============================================================================
  index.html — AI VTuber 網頁入口
  職責：定義頁面結構，載入 Live2D 核心函式庫與主程式。
  頁面只有兩個元素：
    1. live2d-canvas   — 全螢幕 Live2D 渲染畫布
    2. bottom-bar      — 畫面底部中央的錄音按鈕
============================================================================= -->
<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leadtek-UnariQ AI VTuber Web</title>

    <!-- Live2D Cubism 4 核心執行時期（WebAssembly 版本）。
         必須在所有其他 JS 之前載入，pixi-live2d-display 會在 window 上尋找
         CubismSdkVersion 等全域符號，若順序錯誤會拋出初始化例外。 -->
    <script src="/live2dcubismcore.min.js"></script>
  </head>
  <body>
    <!-- VTuber 渲染區：canvas 鋪滿整個視窗，麥克風按鈕懸浮在人物正下方。 -->
    <div id="vtuber-panel">
      <canvas id="live2d-canvas"></canvas>
      <div id="bottom-bar">
        <button id="record-btn">&#127908;</button>
      </div>
    </div>

    <!-- 主程式入口：type="module" 啟用 ES 模組語法（import/export）。
         Vite 在開發模式下會即時處理此模組，生產打包後替換為 bundle。 -->
    <script type="module" src="/src/main.js"></script>

  </body>
</html>
